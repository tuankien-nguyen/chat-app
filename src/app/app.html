@if (!isLoggedIn()) {
  <div class="login-wrapper" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5;">
    
    <mat-card style="width: 400px; padding: 24px; text-align: center;">
      <mat-card-content>
        <h2 style="margin-bottom: 24px; color: #333;">Tham gia Phòng Chat</h2>
        
        <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 16px;">
          <mat-label>Tên của bạn</mat-label>
          <input matInput [(ngModel)]="username" (keyup.enter)="joinRoom()" placeholder="Ví dụ: Anh Ba Lập Trình">
        </mat-form-field>

        <button mat-raised-button color="primary" style="width: 100%; padding: 12px;" (click)="joinRoom()">
          Vào phòng ngay
        </button>
      </mat-card-content>
    </mat-card>

  </div>
} 

@else {
  <div class="chat-wrapper">
    <h1>Chào mừng {{ username() }} đã vào phòng chat!</h1>
    <p>Khung chat thời gian thực sẽ hiển thị ở đây ở bước tiếp theo.</p>
  </div>
}
